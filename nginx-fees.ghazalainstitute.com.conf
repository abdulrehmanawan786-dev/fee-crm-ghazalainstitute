# Nginx config for fees.ghazalainstitute.com
# Place this at /etc/nginx/sites-available/fees.ghazalainstitute.com
# then: sudo ln -s /etc/nginx/sites-available/fees.ghazalainstitute.com /etc/nginx/sites-enabled/
# then: sudo nginx -t && sudo systemctl reload nginx
# then run certbot (see README.md) to add HTTPS — certbot will rewrite this file
# to add the SSL block automatically.

server {
    listen 80;
    server_name fees.ghazalainstitute.com;

    # React frontend (static build output)
    root /var/www/ghazala-fee-crm/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxied to the Node/Express process managed by PM2
    location /api/ {
        proxy_pass http://127.0.0.1:4001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:4001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    client_max_body_size 20M;
}
